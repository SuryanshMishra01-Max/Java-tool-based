<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suryansh Mishra</title>
    <style>
        body {
            background-color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
        }
        h1 {
            color: red;
        }
        p {
            color: yellow;
            font-size: 20px;
            background-color: black;
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
        }
        .div1 {
            background-color: lightblue;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 8px;
        }
        .div2 {
            background-color: lightgreen;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 8px;
        }
        .name {
            color: darkblue;
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>This is a red heading</h1>
    <p>This is a line</p>

    <div class="div1">This is a first div</div>
    <div class="div2">This is a second div</div>

    <div class="name">Suryansh Mishra</div>
</body>
</html>
