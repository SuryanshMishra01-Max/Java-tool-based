<!DOCTYPE html>
<html>
<head>
    <style>
        /* Element selector for heading */
        h1 {
            color: blue;
            text-align: center;
        }

        /* Class selector for paragraph */
        .para {
            color: green;
            font-size: 18px;
        }

        /* ID selector for div */
        #box {
            background: lightgray;
            padding: 15px;
            border: 2px solid black;
        }
    </style>
</head>

<body>

    <div id="box">
        This is a div using ID selector
    </div>

    <p class="para">
        This is a paragraph using CLASS selector
    </p>

    <h1>
        This is a heading using ELEMENT selector
    </h1>

</body>
</html>
