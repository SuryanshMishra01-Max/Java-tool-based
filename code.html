<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music World</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #0a0a0a;
      color: white;
      overflow-x: hidden;
    }

    /* Background animation with floating music notes */
    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }
    .note {
      position: absolute;
      color: #ff007f;
      font-size: 2rem;
      animation: float 8s linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: rgba(0,0,0,0.6);
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 2;
    }
    header h1 {
      font-size: 1.5rem;
      color: #ffcc00;
      font-weight: bold;
    }
    .login-btn {
      background: #4285F4;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    /* Main content */
    .container {
      margin-top: 120px;
      text-align: center;
    }
    .atheist-text {
      font-size: 2rem;
      color: #00ffcc;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .player {
      margin: 20px auto;
      max-width: 500px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
    }
    audio {
      width: 100%;
      border-radius: 10px;
      margin: 10px 0;
    }

    /* Notes & lyrics */
    .notes {
      margin: 40px auto;
      padding: 20px;
      max-width: 600px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      text-align: left;
    }
    .notes h2 {
      color: #ffcc00;
      font-size: 1.3rem;
    }
    .notes button {
      background: #ff007f;
      border: none;
      color: white;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* Saved alert */
    .saved {
      position: fixed;
      bottom: 15px;
      left: 15px;
      background: #00cc66;
      color: white;
      padding: 8px 15px;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Background notes -->
  <div class="background" id="background"></div>

  <!-- Header -->
  <header>
    <h1>🎵 Music World</h1>
    <button class="login-btn" onclick="login()">Google Login</button>
  </header>

  <!-- Main -->
  <div class="container">
    <div class="atheist-text">There are many voices, but only one rhythm 🎶</div>

    <div class="player">
      <h2>Now Playing</h2>
      <!-- First uploaded note -->
      <audio controls>
        <source src="AUD-20250916-WA0002.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
      <!-- Second uploaded note -->
      <audio controls>
        <source src="AUD-20250916-WA0002.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <div class="notes">
      <h2>Random Music Notes 🎼</h2>
      <p id="note-text">Click below to get random music notes or lyrics.</p>
      <button onclick="randomNote()">Get Random</button>
    </div>
  </div>

  <!-- Saved message -->
  <div class="saved" id="saved">✔ Saved</div>

  <script>
    // Background floating notes
    const symbols = ["♪","♫","♬","🎶","♩","𝄞"];
    function createNote() {
      const note = document.createElement("div");
      note.className = "note";
      note.innerText = symbols[Math.floor(Math.random()*symbols.length)];
      note.style.left = Math.random() * 100 + "vw";
      note.style.animationDuration = (5 + Math.random()*5) + "s";
      document.getElementById("background").appendChild(note);
      setTimeout(()=>note.remove(),8000);
    }
    setInterval(createNote, 800);

    // Random notes/lyrics
    const texts = [
      "La la la... feel the vibe 🎶",
      "Music is life’s heartbeat ♥",
      "When words fail, music speaks.",
      "Do re mi fa so la ti 🎼",
      "Lost in rhythm, found in harmony."
    ];
    function randomNote(){
      document.getElementById("note-text").innerText = texts[Math.floor(Math.random()*texts.length)];
    }

    // Fake Google Login
    function login(){
      // Normally here would be Google Auth
      document.querySelector(".login-btn").innerText = "Welcome!";
      let saved = document.getElementById("saved");
      saved.style.display = "block";
      setTimeout(()=>saved.style.display="none", 3000);
    }
  </script>
</body>
</html>
