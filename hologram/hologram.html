<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Hologram Control</title>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }
    video {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 160px;
      border: 2px solid cyan;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<script>
  // THREE.JS SETUP
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  const renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // HOLOGRAM OBJECT
  const geometry = new THREE.TorusKnotGeometry(1, 0.3, 120, 16);
  const material = new THREE.MeshBasicMaterial({
    color: 0x00ffff,
    wireframe: true
  });
  const hologram = new THREE.Mesh(geometry, material);
  scene.add(hologram);

  // LIGHT
  const light = new THREE.PointLight(0x00ffff, 1);
  light.position.set(5, 5, 5);
  scene.add(light);

  // MEDIAPIPE HANDS
  const video = document.getElementById("video");

  const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
  });

  hands.onResults(results => {
    if (results.multiHandLandmarks) {
      const hand = results.multiHandLandmarks[0];
      const x = hand[9].x - 0.5;
      const y = hand[9].y - 0.5;

      hologram.rotation.y = x * Math.PI * 2;
      hologram.rotation.x = y * Math.PI * 2;
    }
  });

  const cameraFeed = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 640,
    height: 480
  });
  cameraFeed.start();

  // ANIMATION LOOP
  function animate() {
    requestAnimationFrame(animate);
    hologram.rotation.z += 0.002;
    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
